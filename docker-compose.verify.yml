services:
  mysql:
    image: mysql:8.4
    container_name: langelermvc-mysql
    environment:
      MYSQL_DATABASE: langelermvc_test
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgsql:
    image: postgres:16
    container_name: langelermvc-pgsql
    environment:
      POSTGRES_DB: langelermvc_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langelermvc_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  sqlsrv:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: langelermvc-sqlsrv
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -C"]
      interval: 15s
      timeout: 10s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: langelermvc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    container_name: langelermvc-memcached
    ports:
      - "11211:11211"
